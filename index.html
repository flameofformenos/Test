<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Fireworks!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    #hint {
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 1.4rem;
      pointer-events: none;
      animation: pulse 2s infinite;
      letter-spacing: 2px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    #score {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 2.5rem;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(255,255,100,0.8);
      transition: transform 0.1s;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">TAP ANYWHERE ✨</div>
  <div id="score">🎆 0</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const scoreEl = document.getElementById('score');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let particles = [];
    let stars = [];
    let count = 0;
    let audioCtx = null;

    // Resize
    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      makeStars();
    });

    // --- Audio ---
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playBoom(x, y) {
      try {
        const ac = getAudio();
        const now = ac.currentTime;

        // Compressor to keep everything loud without clipping
        const comp = ac.createDynamicsCompressor();
        comp.threshold.value = -6;
        comp.knee.value = 3;
        comp.ratio.value = 4;
        comp.attack.value = 0.001;
        comp.release.value = 0.1;
        comp.connect(ac.destination);

        // 1. Deep bass THUD - the main boom (like a kick drum)
        const bassOsc = ac.createOscillator();
        const bassGain = ac.createGain();
        bassOsc.connect(bassGain);
        bassGain.connect(comp);
        bassOsc.type = 'sine';
        bassOsc.frequency.setValueAtTime(160, now);
        bassOsc.frequency.exponentialRampToValueAtTime(30, now + 0.35);
        bassGain.gain.setValueAtTime(3.0, now);
        bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        bassOsc.start(now);
        bassOsc.stop(now + 0.5);

        // 2. Mid body - noise through lowpass for the "whomp"
        const bodyBuf = ac.createBuffer(1, ac.sampleRate * 0.4, ac.sampleRate);
        const bodyData = bodyBuf.getChannelData(0);
        for (let i = 0; i < bodyData.length; i++) bodyData[i] = Math.random() * 2 - 1;
        const bodySrc = ac.createBufferSource();
        bodySrc.buffer = bodyBuf;
        const bodyLp = ac.createBiquadFilter();
        bodyLp.type = 'lowpass';
        bodyLp.frequency.value = 400;
        const bodyGain = ac.createGain();
        bodySrc.connect(bodyLp);
        bodyLp.connect(bodyGain);
        bodyGain.connect(comp);
        bodyGain.gain.setValueAtTime(2.5, now);
        bodyGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        bodySrc.start(now);

        // 3. Crackle - noise through bandpass for sparkly tail
        const crackBuf = ac.createBuffer(1, ac.sampleRate * 0.6, ac.sampleRate);
        const crackData = crackBuf.getChannelData(0);
        for (let i = 0; i < crackData.length; i++) {
          crackData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / crackData.length, 1.2);
        }
        const crackSrc = ac.createBufferSource();
        crackSrc.buffer = crackBuf;
        const crackHp = ac.createBiquadFilter();
        crackHp.type = 'bandpass';
        crackHp.frequency.value = 3000;
        crackHp.Q.value = 0.5;
        const crackGain = ac.createGain();
        crackSrc.connect(crackHp);
        crackHp.connect(crackGain);
        crackGain.connect(comp);
        crackGain.gain.setValueAtTime(1.5, now + 0.06);
        crackGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        crackSrc.start(now + 0.06);

        // 4. Random musical sparkle note — makes each explosion feel unique
        const notes = [261, 329, 392, 440, 523, 659, 784];
        const freq = notes[Math.floor(Math.random() * notes.length)];
        const sparkOsc = ac.createOscillator();
        const sparkGain = ac.createGain();
        sparkOsc.connect(sparkGain);
        sparkGain.connect(comp);
        sparkOsc.type = 'triangle';
        sparkOsc.frequency.setValueAtTime(freq * 2, now + 0.05);
        sparkOsc.frequency.exponentialRampToValueAtTime(freq, now + 0.2);
        sparkGain.gain.setValueAtTime(0.8, now + 0.05);
        sparkGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        sparkOsc.start(now + 0.05);
        sparkOsc.stop(now + 0.4);

      } catch(e) {}
    }

    // --- Background stars ---
    function makeStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.3,
          alpha: Math.random(),
          speed: Math.random() * 0.02 + 0.005
        });
      }
    }
    makeStars();

    // --- Particle class ---
    const COLORS = [
      '#ff4466','#ff6644','#ffcc00','#44ff66',
      '#44ccff','#aa44ff','#ff44cc','#ffffff',
      '#ff8800','#00ffcc','#ff0088','#88ff00'
    ];

    function spawnFirework(x, y) {
      count++;
      scoreEl.textContent = '🎆 ' + count;
      scoreEl.style.transform = 'scale(1.3)';
      setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);

      if (count === 1) hint.style.opacity = '0';

      playBoom(x, y);

      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const color2 = COLORS[Math.floor(Math.random() * COLORS.length)];
      const n = 60 + Math.floor(Math.random() * 40);

      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i) / n + Math.random() * 0.3;
        const speed = 2 + Math.random() * 7;
        const c = Math.random() > 0.5 ? color : color2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - Math.random() * 2,
          r: Math.random() * 4 + 2,
          color: c,
          alpha: 1,
          decay: 0.012 + Math.random() * 0.015,
          gravity: 0.12 + Math.random() * 0.08,
          trail: [],
          shape: Math.random() > 0.7 ? 'star' : 'circle'
        });
      }

      // Sparkle ring
      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 * i) / 20;
        particles.push({
          x, y,
          vx: Math.cos(angle) * (1 + Math.random()),
          vy: Math.sin(angle) * (1 + Math.random()),
          r: 2,
          color: '#ffffff',
          alpha: 1,
          decay: 0.03,
          gravity: 0,
          trail: [],
          shape: 'circle'
        });
      }
    }

    function drawStar(ctx, x, y, r, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (Math.PI * 2 * i) / 5 - Math.PI / 2;
        const a2 = a + Math.PI / 5;
        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // --- Animation loop ---
    function draw() {
      // Fade trail
      ctx.fillStyle = 'rgba(10, 10, 26, 0.18)';
      ctx.fillRect(0, 0, W, H);

      // Background stars twinkle
      stars.forEach(s => {
        s.alpha += s.speed * (Math.random() > 0.5 ? 1 : -1);
        s.alpha = Math.max(0.1, Math.min(1, s.alpha));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
      });

      // Update & draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
        if (p.trail.length > 6) p.trail.shift();

        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.97;
        p.alpha -= p.decay;

        if (p.alpha <= 0) { particles.splice(i, 1); continue; }

        // Trail
        p.trail.forEach((t, ti) => {
          const ta = t.alpha * (ti / p.trail.length) * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, p.r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = ta;
          ctx.fill();
          ctx.globalAlpha = 1;
        });

        // Particle
        if (p.shape === 'star') {
          drawStar(ctx, p.x, p.y, p.r * 1.5, p.color, p.alpha);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // Glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
        grad.addColorStop(0, p.color + '88');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.globalAlpha = p.alpha * 0.5;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      requestAnimationFrame(draw);
    }

    // --- Input ---
    function handleTap(x, y) {
      spawnFirework(x, y);
    }

    canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => handleTap(t.clientX, t.clientY));
    }, { passive: false });

    // Multi-touch: fire at all touch points on move too
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (Math.random() > 0.6) { // throttle
        const t = e.changedTouches[0];
        handleTap(t.clientX, t.clientY);
      }
    }, { passive: false });

    draw();

    // Auto demo firework on load to show what it does
    setTimeout(() => spawnFirework(W/2, H/2), 600);
    setTimeout(() => spawnFirework(W*0.3, H*0.4), 1100);
    setTimeout(() => spawnFirework(W*0.7, H*0.35), 1600);
  </script>
</body>
</html>
