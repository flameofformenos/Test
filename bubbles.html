<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pop the Bubbles!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #0d1b2a 0%, #1a3a5c 60%, #0d2137 100%);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    #score {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 2.8rem;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(100,200,255,0.9);
      transition: transform 0.08s;
    }
    #combo {
      position: fixed;
      top: 80px;
      width: 100%;
      text-align: center;
      font-size: 1.6rem;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      color: #ffdd44;
      text-shadow: 0 0 15px rgba(255,200,0,0.8);
    }
    #hint {
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 1.3rem;
      font-family: Arial, sans-serif;
      pointer-events: none;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.35; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="score">🫧 0</div>
  <div id="combo" id="combo"></div>
  <div id="hint">POP THE BUBBLES!</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const hintEl = document.getElementById('hint');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    });

    let bubbles = [];
    let popParticles = [];
    let score = 0;
    let combo = 0;
    let comboTimer = null;
    let audioCtx = null;
    let frameCount = 0;

    // ── Audio ──────────────────────────────────────────────
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playPop(radius) {
      try {
        const ac = getAudio();
        const now = ac.currentTime;

        // Fast limiter — preserves the sharp transient, just prevents clipping
        const comp = ac.createDynamicsCompressor();
        comp.threshold.value = -3;
        comp.knee.value = 0;
        comp.ratio.value = 20;
        comp.attack.value = 0.00001; // near-zero — don't kill the crack
        comp.release.value = 0.015;
        comp.connect(ac.destination);

        // ── THE CRACK ──
        // Bubble wrap is a membrane snapping. 15ms, brutal decay, NO low end.
        const crackLen = Math.floor(ac.sampleRate * 0.015); // 15ms only
        const crackBuf = ac.createBuffer(1, crackLen, ac.sampleRate);
        const crackData = crackBuf.getChannelData(0);
        for (let i = 0; i < crackLen; i++) {
          const env = Math.pow(1 - i / crackLen, 12); // very steep — snap not sustain
          crackData[i] = (Math.random() * 2 - 1) * env;
        }
        const crackSrc = ac.createBufferSource();
        crackSrc.buffer = crackBuf;

        // Highpass at 1.2kHz — cuts ALL the mud and silencer-ness
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 1200;
        hp.Q.value = 0.5;

        // Bell boost at 3.5kHz — the "snap" sweet spot for plastic cracking
        const snap = ac.createBiquadFilter();
        snap.type = 'peaking';
        snap.frequency.value = Math.max(2500, 4000 - radius * 15);
        snap.gain.value = 10;
        snap.Q.value = 1.2;

        const crackGain = ac.createGain();
        crackSrc.connect(hp);
        hp.connect(snap);
        snap.connect(crackGain);
        crackGain.connect(comp);
        crackGain.gain.setValueAtTime(6.0, now);
        crackSrc.start(now);

        // ── TINY AIR PUFF ──
        // Just a whisper of mid-range body — bubble wrap has a tiny "pff" of air
        // Keep this very quiet or it turns into a silencer again
        const airLen = Math.floor(ac.sampleRate * 0.022);
        const airBuf = ac.createBuffer(1, airLen, ac.sampleRate);
        const airData = airBuf.getChannelData(0);
        for (let i = 0; i < airLen; i++) {
          const env = Math.pow(1 - i / airLen, 5);
          airData[i] = (Math.random() * 2 - 1) * env;
        }
        const airSrc = ac.createBufferSource();
        airSrc.buffer = airBuf;
        const airBp = ac.createBiquadFilter();
        airBp.type = 'bandpass';
        airBp.frequency.value = 900;
        airBp.Q.value = 2.5;
        const airGain = ac.createGain();
        airSrc.connect(airBp);
        airBp.connect(airGain);
        airGain.connect(comp);
        airGain.gain.setValueAtTime(0.8, now); // quiet — supporting role only
        airSrc.start(now);

      } catch(e) {}
    }

    // ── Bubble colours ─────────────────────────────────────
    const BUBBLE_HUES = [200, 220, 260, 300, 170, 40, 340];

    class Bubble {
      constructor() { this.reset(true); }

      reset(init = false) {
        this.r = 28 + Math.random() * 52;
        this.x = this.r + Math.random() * (W - this.r * 2);
        this.y = init ? Math.random() * H : H + this.r + 20;
        this.vy = -(0.4 + Math.random() * 0.7);
        this.vx = 0;
        this.phase = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.015 + Math.random() * 0.015;
        this.wobbleAmp = 0.4 + Math.random() * 0.5;
        this.hue = BUBBLE_HUES[Math.floor(Math.random() * BUBBLE_HUES.length)];
        this.hueShift = 0;
        this.alpha = 0.55 + Math.random() * 0.3;
        this.alive = true;
        this.popping = false;
        this.popScale = 1;
      }

      update() {
        this.phase += this.wobbleSpeed;
        this.x += Math.sin(this.phase) * this.wobbleAmp;
        this.y += this.vy;
        this.hueShift = (this.hueShift + 0.5) % 360;
        if (this.y + this.r < -10) this.reset();
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        const h = (this.hue + this.hueShift * 0.3) % 360;

        // Outer glow
        const glow = ctx.createRadialGradient(0, 0, this.r * 0.7, 0, 0, this.r * 1.3);
        glow.addColorStop(0, `hsla(${h},80%,70%,0)`);
        glow.addColorStop(1, `hsla(${h},90%,75%,0.12)`);
        ctx.beginPath();
        ctx.arc(0, 0, this.r * 1.3, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // Bubble body — thin translucent shell
        const body = ctx.createRadialGradient(-this.r*0.2, -this.r*0.2, this.r*0.1, 0, 0, this.r);
        body.addColorStop(0,   `hsla(${h},70%,90%,0.08)`);
        body.addColorStop(0.6, `hsla(${h},80%,60%,${this.alpha * 0.35})`);
        body.addColorStop(1,   `hsla(${(h+40)%360},90%,70%,${this.alpha * 0.7})`);
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = body;
        ctx.fill();

        // Rim — iridescent edge
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${(h+60)%360},100%,85%,0.6)`;
        ctx.lineWidth = this.r * 0.06;
        ctx.stroke();

        // Main specular highlight — top-left bright spot
        const hl = ctx.createRadialGradient(
          -this.r * 0.32, -this.r * 0.38, 0,
          -this.r * 0.28, -this.r * 0.32, this.r * 0.38
        );
        hl.addColorStop(0,   'rgba(255,255,255,0.95)');
        hl.addColorStop(0.4, 'rgba(255,255,255,0.4)');
        hl.addColorStop(1,   'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = hl;
        ctx.fill();

        // Small secondary highlight — bottom-right twinkle
        const hl2 = ctx.createRadialGradient(
          this.r * 0.38, this.r * 0.42, 0,
          this.r * 0.38, this.r * 0.42, this.r * 0.18
        );
        hl2.addColorStop(0, 'rgba(255,255,255,0.5)');
        hl2.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = hl2;
        ctx.fill();

        ctx.restore();
      }

      contains(px, py) {
        const dx = px - this.x, dy = py - this.y;
        return dx * dx + dy * dy <= this.r * this.r;
      }
    }

    // ── Pop particles ───────────────────────────────────────
    function spawnPopParticles(x, y, r, hue) {
      // Ring pulse
      popParticles.push({ type: 'ring', x, y, r, maxR: r * 2.5, hue, alpha: 0.9, life: 1 });

      // Water droplets flying out
      const count = 8 + Math.floor(r / 8);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i / count) + Math.random() * 0.4;
        const speed = 2 + Math.random() * 4;
        popParticles.push({
          type: 'drop',
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 2 + Math.random() * 4,
          hue: (hue + Math.random() * 40 - 20 + 360) % 360,
          alpha: 1,
          life: 1,
          decay: 0.04 + Math.random() * 0.04
        });
      }

      // Sparkles
      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        popParticles.push({
          type: 'sparkle',
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 1.5 + Math.random() * 2,
          hue: (hue + 60) % 360,
          alpha: 1,
          life: 1,
          decay: 0.035 + Math.random() * 0.03
        });
      }
    }

    function updateDrawParticles() {
      for (let i = popParticles.length - 1; i >= 0; i--) {
        const p = popParticles[i];

        if (p.type === 'ring') {
          p.r += (p.maxR - p.r) * 0.18;
          p.alpha -= 0.06;
          if (p.alpha <= 0) { popParticles.splice(i, 1); continue; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${p.hue},80%,75%,${p.alpha})`;
          ctx.lineWidth = 2.5;
          ctx.stroke();

        } else if (p.type === 'drop') {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.vx *= 0.97;
          p.alpha -= p.decay;
          if (p.alpha <= 0) { popParticles.splice(i, 1); continue; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          const dg = ctx.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, 0, p.x, p.y, p.r);
          dg.addColorStop(0, `hsla(${p.hue},70%,90%,${p.alpha})`);
          dg.addColorStop(1, `hsla(${p.hue},80%,60%,${p.alpha * 0.5})`);
          ctx.fillStyle = dg;
          ctx.fill();

        } else if (p.type === 'sparkle') {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.95;
          p.vy *= 0.95;
          p.alpha -= p.decay;
          if (p.alpha <= 0) { popParticles.splice(i, 1); continue; }
          // Draw as 4-pointed star
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.fillStyle = `hsla(${p.hue},100%,90%,${p.alpha})`;
          ctx.beginPath();
          for (let s = 0; s < 4; s++) {
            const a = s * Math.PI / 2;
            const a2 = a + Math.PI / 4;
            if (s === 0) ctx.moveTo(Math.cos(a) * p.r * 2, Math.sin(a) * p.r * 2);
            else ctx.lineTo(Math.cos(a) * p.r * 2, Math.sin(a) * p.r * 2);
            ctx.lineTo(Math.cos(a2) * p.r * 0.5, Math.sin(a2) * p.r * 0.5);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    // ── Init bubbles ────────────────────────────────────────
    const NUM_BUBBLES = Math.min(18, Math.floor(W * H / 28000) + 8);
    for (let i = 0; i < NUM_BUBBLES; i++) bubbles.push(new Bubble());

    // Spawn new bubbles periodically
    setInterval(() => {
      if (bubbles.filter(b => b.alive).length < NUM_BUBBLES) {
        bubbles.push(new Bubble());
      }
    }, 1200);

    // ── Tap handling ────────────────────────────────────────
    function tryPop(px, py) {
      // Pop smallest bubble on top first (highest z = last drawn)
      let hit = null;
      for (let i = bubbles.length - 1; i >= 0; i--) {
        if (bubbles[i].alive && bubbles[i].contains(px, py)) {
          hit = bubbles[i];
          break;
        }
      }
      if (!hit) return;

      hit.alive = false;
      playPop(hit.r);
      spawnPopParticles(hit.x, hit.y, hit.r, hit.hue);

      score++;
      scoreEl.textContent = '🫧 ' + score;
      scoreEl.style.transform = 'scale(1.25)';
      setTimeout(() => scoreEl.style.transform = 'scale(1)', 100);

      // Combo
      combo++;
      clearTimeout(comboTimer);
      if (combo >= 3) {
        comboEl.textContent = combo + 'x COMBO! 🎉';
        comboEl.style.opacity = '1';
      }
      comboTimer = setTimeout(() => {
        combo = 0;
        comboEl.style.opacity = '0';
      }, 1200);

      if (score === 1) hintEl.style.opacity = '0';

      // Replace after a moment
      setTimeout(() => {
        hit.reset();
        hit.alive = true;
      }, 600 + Math.random() * 800);
    }

    canvas.addEventListener('click', e => tryPop(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => tryPop(t.clientX, t.clientY));
    }, { passive: false });

    // ── Draw loop ───────────────────────────────────────────
    function draw() {
      frameCount++;
      ctx.clearRect(0, 0, W, H);

      // Draw living bubbles
      bubbles.forEach(b => {
        if (b.alive) {
          b.update();
          b.draw();
        }
      });

      // Draw pop effects on top
      updateDrawParticles();

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
